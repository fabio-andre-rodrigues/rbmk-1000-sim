name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

# ──────────────────────────────────────────────────────────────────
# Pipeline: version → update → test → build → tag → release
# ──────────────────────────────────────────────────────────────────

jobs:

  # ── Step 1: Determine next version from conventional commits ──
  version:
    name: "1. Compute version"
    runs-on: ubuntu-latest
    outputs:
      current: ${{ steps.current.outputs.version }}
      next: ${{ steps.next.outputs.version }}
      bump: ${{ steps.next.outputs.bump }}
      should_release: ${{ steps.next.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read current version from Cargo.toml
        id: current
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current: $VERSION"

      - name: Compute next version
        id: next
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          BUMP="${{ inputs.bump }}"
          if [ "$BUMP" = "auto" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
            if echo "$COMMITS" | grep -qiE '^feat!:|^fix!:|^refactor!:|BREAKING CHANGE'; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE '^feat(\(|:)'; then
              BUMP="minor"
            elif echo "$COMMITS" | grep -qiE '^fix(\(|:)|^docs(\(|:)|^ci(\(|:)|^chore(\(|:)'; then
              BUMP="patch"
            else
              echo "No releasable conventional commits since $LAST_TAG"
              echo "should_release=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"

          if git tag -l "v${NEXT}" | grep -q "v${NEXT}"; then
            echo "Tag v${NEXT} already exists"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "Bump: $BUMP  $CURRENT → $NEXT"

  # ── Step 2: Update Cargo.toml and commit ──────────────────────
  update-cargo:
    name: "2. Update Cargo.toml"
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Bump version in Cargo.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ needs.version.outputs.next }}\"/" Cargo.toml
          grep '^version' Cargo.toml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore(release): v${{ needs.version.outputs.next }}"
          git push

  # ── Step 3: Run tests (fail fast before multi-platform build) ─
  test:
    name: "3. Test"
    needs: [version, update-cargo]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --features gfx

  # ── Step 4: Build release binaries (all platforms) ────────────
  build:
    name: "4. Build (${{ matrix.target }})"
    needs: [version, test]
    if: needs.version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: rbmk-1000-sim.exe
            archive: rbmk-1000-sim-windows-x86_64.zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: rbmk-1000-sim
            archive: rbmk-1000-sim-linux-x86_64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: rbmk-1000-sim
            archive: rbmk-1000-sim-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: rbmk-1000-sim
            archive: rbmk-1000-sim-macos-aarch64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install mold linker (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y mold clang

      - name: Build release binary (TUI + GFX)
        run: cargo build --release --target ${{ matrix.target }} --features gfx

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          Copy-Item -Recurse scenarios staging/
          Copy-Item README-RELEASE.txt staging/README.txt
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.archive }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          chmod +x "staging/${{ matrix.binary }}"
          cp -r scenarios staging/
          cp README-RELEASE.txt staging/README.txt
          cd staging && tar czf ../${{ matrix.archive }} *

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # ── Step 5: Create git tag ────────────────────────────────────
  tag:
    name: "5. Tag"
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Create annotated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.version.outputs.next }}" \
            -m "Release v${{ needs.version.outputs.next }}"
          git push origin "v${{ needs.version.outputs.next }}"

  # ── Step 6: Create GitHub release with artifacts ──────────────
  release:
    name: "6. Release"
    needs: [version, tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.version.outputs.next }}"
          generate_release_notes: true
          files: artifacts/*
