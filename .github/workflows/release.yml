name: Release

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should_release: ${{ steps.check-tag.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version from Cargo.toml
        id: get-version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: v${VERSION}"

      - name: Check if tag already exists
        id: check-tag
        run: |
          TAG="${{ steps.get-version.outputs.version }}"
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists — skipping release"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG does not exist — will create release"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: rbmk-1000-sim.exe
            archive: rbmk-1000-sim-windows-x86_64.zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: rbmk-1000-sim
            archive: rbmk-1000-sim-linux-x86_64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: rbmk-1000-sim
            archive: rbmk-1000-sim-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: rbmk-1000-sim
            archive: rbmk-1000-sim-macos-aarch64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install mold linker (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y mold clang

      - name: Build release binary (TUI + GFX)
        run: cargo build --release --target ${{ matrix.target }} --features gfx

      - name: Run tests
        if: matrix.target != 'aarch64-apple-darwin'
        run: cargo test --release --target ${{ matrix.target }} --features gfx

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          Copy-Item -Recurse scenarios staging/
          Copy-Item README-RELEASE.txt staging/README.txt
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.archive }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          chmod +x "staging/${{ matrix.binary }}"
          cp -r scenarios staging/
          cp README-RELEASE.txt staging/README.txt
          cd staging && tar czf ../${{ matrix.archive }} *

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.check-version.outputs.version }}" -m "Release ${{ needs.check-version.outputs.version }}"
          git push origin "${{ needs.check-version.outputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
