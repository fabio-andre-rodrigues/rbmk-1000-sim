name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: rbmk-1000-sim.exe
            archive: rbmk-1000-sim-windows-x86_64.zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: rbmk-1000-sim
            archive: rbmk-1000-sim-linux-x86_64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: rbmk-1000-sim
            archive: rbmk-1000-sim-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: rbmk-1000-sim
            archive: rbmk-1000-sim-macos-aarch64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Install mold linker (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y mold clang

      - name: Install lld linker (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install llvm

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        if: matrix.target != 'aarch64-apple-darwin'
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          Copy-Item -Recurse scenarios staging/
          Copy-Item README-RELEASE.txt staging/README.txt
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.archive }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          chmod +x "staging/${{ matrix.binary }}"
          cp -r scenarios staging/
          cp README-RELEASE.txt staging/README.txt
          cd staging && tar czf ../${{ matrix.archive }} *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
