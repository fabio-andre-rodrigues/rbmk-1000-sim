name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine bump type and compute next version
        id: bump
        run: |
          # Current version from Cargo.toml
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          echo "Current version: $CURRENT"

          # Find last release tag
          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Commits since: $LAST_TAG"

          # Determine bump type
          BUMP="${{ inputs.bump }}"
          if [ "$BUMP" = "auto" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
            if echo "$COMMITS" | grep -qiE '^feat!:|^fix!:|^refactor!:|BREAKING CHANGE'; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE '^feat(\(|:)'; then
              BUMP="minor"
            elif echo "$COMMITS" | grep -qiE '^fix(\(|:)|^docs(\(|:)|^ci(\(|:)|^chore(\(|:)'; then
              BUMP="patch"
            else
              echo "No conventional commits found since $LAST_TAG — skipping release"
              echo "should_release=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Bump version
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP → v${NEW_VERSION}"

          # Check if tag already exists
          if git tag -l "v${NEW_VERSION}" | grep -q "v${NEW_VERSION}"; then
            echo "Tag v${NEW_VERSION} already exists — skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "version=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml version
        if: steps.bump.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          VERSION="${VERSION#v}"  # strip v prefix
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          echo "Cargo.toml updated to $VERSION"
          grep '^version' Cargo.toml

      - name: Commit version bump
        if: steps.bump.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push

  build:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: rbmk-1000-sim.exe
            archive: rbmk-1000-sim-windows-x86_64.zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: rbmk-1000-sim
            archive: rbmk-1000-sim-linux-x86_64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: rbmk-1000-sim
            archive: rbmk-1000-sim-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: rbmk-1000-sim
            archive: rbmk-1000-sim-macos-aarch64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install mold linker (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y mold clang

      - name: Build release binary (TUI + GFX)
        run: cargo build --release --target ${{ matrix.target }} --features gfx

      - name: Run tests
        if: matrix.target != 'aarch64-apple-darwin'
        run: cargo test --release --target ${{ matrix.target }} --features gfx

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          Copy-Item -Recurse scenarios staging/
          Copy-Item README-RELEASE.txt staging/README.txt
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.archive }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" staging/
          chmod +x "staging/${{ matrix.binary }}"
          cp -r scenarios staging/
          cp README-RELEASE.txt staging/README.txt
          cd staging && tar czf ../${{ matrix.archive }} *

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.version }}" -m "Release ${{ needs.version.outputs.version }}"
          git push origin "${{ needs.version.outputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
