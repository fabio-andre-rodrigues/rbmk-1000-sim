# Faster linking per platform. These require the linkers to be installed:
#   Windows: lld (ships with MSVC/LLVM)
#   Linux:   mold (apt install mold) + clang
#   macOS:   lld (brew install llvm)
# If a linker isn't found, cargo falls back to the default.

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]
